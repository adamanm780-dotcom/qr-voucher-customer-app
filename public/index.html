<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Voucher Pro — Business Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #ffffff;
            --bg-secondary: #fafbfc;
            --bg-tertiary: #f3f4f6;
            --text-primary: #0a0a0a;
            --text-secondary: #65676b;
            --text-tertiary: #8a8d91;
            --primary: #2563eb;
            --accent: #1e40af;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #0f1117;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #252d3d;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --text-tertiary: #718096;
            --border: #2d3544;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            transition: background 200ms ease, color 200ms ease;
        }

        .container {
            width: 100%;
            max-width: 390px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(135deg, #f0f4ff 0%, #fff5f0 50%, #f0fff4 100%);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] .bg-pattern {
            background: linear-gradient(135deg, #1a3a5c 0%, #3d1f2c 50%, #1a3d2a 100%);
            opacity: 0.15;
        }

        @keyframes slideInFromBottom { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDelayed { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFromLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* LOGIN */
        .login-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            justify-content: space-between;
            padding: 48px 24px;
            position: relative;
            z-index: 1;
        }

        .login-screen.hidden { display: none; }

        .login-header { animation: fadeInDelayed 0.6s ease; }
        .login-header h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .login-header p { font-size: 14px; color: var(--text-tertiary); font-weight: 500; }

        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: slideInFromBottom 0.8s ease;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Sora', sans-serif;
            color: var(--text-primary);
            transition: all 200ms ease;
        }
        .form-group input:focus { outline: none; background: var(--bg); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 200ms ease;
            font-family: 'Sora', sans-serif;
        }
        .login-btn:hover { background: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

        /* APP */
        .app-screen { display: none; flex-direction: column; width: 100%; height: 100%; position: relative; z-index: 1; }
        .app-screen.active { display: flex; }

        .app-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .app-header-left h1 { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
        .app-header-left p { font-size: 11px; color: var(--text-tertiary); }

        .app-header-right {
            display: flex;
            gap: 8px;
        }

        .theme-toggle, .logout-btn {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Sora', sans-serif;
            transition: all 150ms ease;
        }

        .theme-toggle:hover, .logout-btn:hover {
            background: var(--bg);
            border-color: var(--primary);
        }

        .search-bar {
            padding: 0 20px;
            margin: 12px 0;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Sora', sans-serif;
            color: var(--text-primary);
            transition: all 200ms ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
        }

        .page { display: none; animation: fadeInDelayed 0.3s ease; }
        .page.active { display: block; }

        .page-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.3px; }

        /* DASHBOARD */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .dashboard-card {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.05) 0%, rgba(16, 185, 129, 0.03) 100%);
            border: 1px solid rgba(37, 99, 235, 0.1);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .dashboard-card-title { font-size: 11px; color: var(--text-tertiary); font-weight: 600; margin-bottom: 6px; }
        .dashboard-card-value { font-size: 24px; font-weight: 800; color: var(--primary); }
        .dashboard-card-trend { font-size: 10px; color: var(--success); margin-top: 4px; }

        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            height: 200px;
            position: relative;
        }

        /* VOUCHER CARDS */
        .voucher-grid { display: flex; flex-direction: column; gap: 12px; }

        .voucher-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 200ms ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .voucher-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            opacity: 0;
            transition: opacity 200ms ease;
        }

        .voucher-card:hover {
            border-color: var(--primary);
            background: var(--bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .voucher-card:hover::before {
            opacity: 1;
        }

        .voucher-info { flex: 1; }
        .voucher-code { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
        .voucher-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px; }
        .voucher-status { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; background: var(--success); color: white; }

        .voucher-actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 150ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* BUTTONS */
        .btn {
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 200ms ease;
            font-family: 'Sora', sans-serif;
        }

        .btn:hover { background: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-full { width: 100%; margin-bottom: 16px; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal.active { display: flex; animation: slideInFromBottom 0.3s ease; }

        .modal-content {
            background: var(--bg);
            border-radius: 20px 20px 0 0;
            padding: 24px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons .btn { flex: 1; padding: 12px; }

        .qr-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin: 16px 0;
        }

        /* NAVIGATION */
        .nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            display: flex;
            gap: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 200ms ease;
            font-family: 'Sora', sans-serif;
        }

        .nav-btn-icon { font-size: 24px; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn:hover { color: var(--text-primary); }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
        .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }
        .empty-text { font-size: 14px; line-height: 1.5; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-pattern"></div>

        <!-- LOGIN -->
        <div class="login-screen" id="loginScreen">
            <div class="login-header">
                <h1>Voucher Pro</h1>
                <p>Enterprise Voucher Management</p>
            </div>

            <div class="login-content">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" value="test@test.de" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" value="test" placeholder="••••••••">
                </div>
                <button class="login-btn" onclick="handleLogin()">Sign In</button>
            </div>

            <div style="text-align: center; font-size: 12px; color: var(--text-tertiary);">
                © 2024 Voucher Pro
            </div>
        </div>

        <!-- APP -->
        <div class="app-screen" id="appScreen">
            <div class="app-header">
                <div class="app-header-left">
                    <h1>Dashboard</h1>
                    <p id="userEmail">test@test.de</p>
                </div>
                <div class="app-header-right">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                    <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search vouchers..." onkeyup="searchVouchers()">
            </div>

            <div class="content">
                <!-- DASHBOARD PAGE -->
                <div class="page active" id="dashboardPage">
                    <div class="page-title">Overview</div>

                    <div class="dashboard-grid">
                        <div class="dashboard-card">
                            <div class="dashboard-card-title">Total Vouchers</div>
                            <div class="dashboard-card-value" id="totalVouchers">0</div>
                            <div class="dashboard-card-trend">Active campaigns</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-card-title">Total Redeemed</div>
                            <div class="dashboard-card-value" id="totalRedeemed">0</div>
                            <div class="dashboard-card-trend">This month</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-card-title">Redemption Rate</div>
                            <div class="dashboard-card-value" id="redemptionRate">0%</div>
                            <div class="dashboard-card-trend">Conversion rate</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-card-title">Active Today</div>
                            <div class="dashboard-card-value" id="activeToday">0</div>
                            <div class="dashboard-card-trend">Live vouchers</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="redemptionchart"></canvas>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Recent Activity</h3>
                        <div class="voucher-grid" id="dashboardVouchers"></div>
                    </div>
                </div>

                <!-- VOUCHERS PAGE -->
                <div class="page" id="vouchersPage">
                    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                        <button class="btn btn-full" onclick="openCreateModal()" style="flex: 1; margin: 0;">✨ New Voucher</button>
                    </div>
                    <div class="voucher-grid" id="vouchersList"></div>
                </div>

                <!-- ANALYTICS PAGE -->
                <div class="page" id="analyticsPage">
                    <div class="page-title">Performance</div>
                    <div class="voucher-grid" id="analyticsContent"></div>
                </div>

                <!-- SETTINGS PAGE -->
                <div class="page" id="settingsPage">
                    <div class="page-title">Settings</div>
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" id="businessName" placeholder="Your business" style="width: 100%; padding: 12px 14px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; font-size: 15px; font-family: Sora, sans-serif; color: var(--text-primary);">
                    </div>
                    <button class="btn btn-full" onclick="saveSettings()">Save</button>
                </div>
            </div>

            <!-- NAVIGATION -->
            <div class="nav">
                <button class="nav-btn active" onclick="switchPage('dashboard')">
                    <span class="nav-btn-icon">🏠</span>
                    <span>Home</span>
                </button>
                <button class="nav-btn" onclick="switchPage('vouchers')">
                    <span class="nav-btn-icon">🎁</span>
                    <span>Vouchers</span>
                </button>
                <button class="nav-btn" onclick="switchPage('analytics')">
                    <span class="nav-btn-icon">📊</span>
                    <span>Analytics</span>
                </button>
                <button class="nav-btn" onclick="switchPage('settings')">
                    <span class="nav-btn-icon">⚡</span>
                    <span>Settings</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">✨ Create Voucher</div>

            <div class="form-group">
                <label>Code</label>
                <input type="text" id="voucherCode" placeholder="SUMMER2024" class="search-input">
            </div>

            <div class="form-group">
                <label>Offer Description</label>
                <input type="text" id="voucherOffer" placeholder="20% Off Everything" class="search-input">
            </div>

            <div class="form-group">
                <label>Valid From</label>
                <input type="date" id="voucherFrom" class="search-input">
            </div>

            <div class="form-group">
                <label>Valid Until</label>
                <input type="date" id="voucherUntil" class="search-input">
            </div>

            <div class="form-group">
                <label>Max Uses (0 = unlimited)</label>
                <input type="number" id="voucherMaxUses" placeholder="100" class="search-input">
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn" onclick="saveVoucher()">Create</button>
            </div>
        </div>
    </div>

    <!-- QR MODAL -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <div class="modal-title" id="qrModalTitle">Voucher QR Code</div>
            <div class="qr-container" id="qrContainer"></div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal('qrModal')">Close</button>
                <button class="btn" onclick="downloadQR()">Download</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            user: null,
            vouchers: [],
            theme: localStorage.getItem('theme') || 'light',

            init() {
                this.loadData();
                document.documentElement.setAttribute('data-theme', this.theme);

                if (this.user) {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appScreen').classList.add('active');
                    this.renderDashboard();
                    this.renderChart();
                }
            },

            loadData() {
                const data = localStorage.getItem('app_data');
                if (data) {
                    const parsed = JSON.parse(data);
                    this.user = parsed.user;
                    this.vouchers = parsed.vouchers || [];
                }
            },

            save() {
                localStorage.setItem('app_data', JSON.stringify({
                    user: this.user,
                    vouchers: this.vouchers
                }));
            },

            renderDashboard() {
                const total = this.vouchers.length;
                const redeemed = this.vouchers.reduce((sum, v) => sum + v.redeemedCount, 0);
                const rate = total > 0 ? Math.round((redeemed / total) * 100) : 0;
                const today = new Date().toISOString().split('T')[0];
                const active = this.vouchers.filter(v => v.validFrom <= today && v.validUntil >= today).length;

                document.getElementById('totalVouchers').textContent = total;
                document.getElementById('totalRedeemed').textContent = redeemed;
                document.getElementById('redemptionRate').textContent = rate + '%';
                document.getElementById('activeToday').textContent = active;
                document.getElementById('userEmail').textContent = this.user.email;

                const emojis = ['🎉', '🌟', '💝', '🎁', '✨', '🔥', '🚀', '💎'];
                const html = this.vouchers.slice(-5).reverse().map((v, i) => `
                    <div class="voucher-card">
                        <div class="voucher-info">
                            <div class="voucher-code">${v.code}</div>
                            <div class="voucher-meta">${v.offer} • ${v.redeemedCount} redeemed</div>
                            <span class="voucher-status">Active</span>
                        </div>
                        <div class="voucher-actions">
                            <button class="action-btn" onclick="app.showQR('${v.id}')" title="QR Code">📱</button>
                            <button class="action-btn" onclick="app.editVoucher('${v.id}')" title="Edit">✏️</button>
                            <button class="action-btn" onclick="app.deleteVoucher('${v.id}')" title="Delete">🗑️</button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('dashboardVouchers').innerHTML = html || '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">No vouchers yet</div></div>';
            },

            renderChart() {
                const ctx = document.getElementById('redemptionchart');
                if (!ctx) return;

                const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                const data = [12, 19, 8, 15, 22, 18, 10];

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: days,
                        datasets: [{
                            label: 'Redemptions',
                            data: data,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.05)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 4,
                            pointBackgroundColor: '#2563eb'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            },

            showQR(id) {
                const voucher = this.vouchers.find(v => v.id === id);
                if (!voucher) return;

                document.getElementById('qrModalTitle').textContent = `${voucher.code} - QR Code`;
                const container = document.getElementById('qrContainer');
                container.innerHTML = '';
                new QRCode(container, {
                    text: voucher.code,
                    width: 200,
                    height: 200,
                    colorDark: '#2563eb',
                    colorLight: '#ffffff'
                });
                document.getElementById('qrModal').classList.add('active');
            },

            editVoucher(id) {
                const voucher = this.vouchers.find(v => v.id === id);
                if (!voucher) return;
                document.getElementById('voucherCode').value = voucher.code;
                document.getElementById('voucherOffer').value = voucher.offer;
                document.getElementById('voucherFrom').value = voucher.validFrom;
                document.getElementById('voucherUntil').value = voucher.validUntil;
                document.getElementById('voucherMaxUses').value = voucher.maxUses || 0;
                document.getElementById('modal').classList.add('active');
            },

            deleteVoucher(id) {
                if (confirm('Delete this voucher?')) {
                    this.vouchers = this.vouchers.filter(v => v.id !== id);
                    this.save();
                    this.render();
                }
            },

            render() {
                this.renderDashboard();
                const html = this.vouchers.map((v, i) => `
                    <div class="voucher-card">
                        <div class="voucher-info">
                            <div class="voucher-code">${v.code}</div>
                            <div class="voucher-meta">${v.offer}</div>
                            <span class="voucher-status">Active</span>
                        </div>
                        <div class="voucher-actions">
                            <button class="action-btn" onclick="app.showQR('${v.id}')">📱</button>
                            <button class="action-btn" onclick="app.editVoucher('${v.id}')">✏️</button>
                            <button class="action-btn" onclick="app.deleteVoucher('${v.id}')">🗑️</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('vouchersList').innerHTML = html || '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">No vouchers yet</div></div>';

                const analyticsHtml = this.vouchers.map(v => `
                    <div class="voucher-card">
                        <div class="voucher-info">
                            <div class="voucher-code">${v.code}</div>
                            <div class="voucher-meta">${v.redeemedCount}/${v.maxUses || '∞'} redeemed</div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('analyticsContent').innerHTML = analyticsHtml || '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-text">No data yet</div></div>';
            }
        };

        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email && password) {
                app.user = { id: 'u_' + Date.now(), email };
                app.save();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.add('active');
                app.renderDashboard();
                app.renderChart();
            }
        }

        function handleLogout() {
            app.user = null;
            app.vouchers = [];
            app.save();
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.remove('active');
        }

        function toggleTheme() {
            app.theme = app.theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', app.theme);
            localStorage.setItem('theme', app.theme);
        }

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.nav-btn').classList.add('active');
        }

        function openCreateModal() {
            document.getElementById('voucherCode').value = '';
            document.getElementById('voucherOffer').value = '';
            document.getElementById('voucherFrom').value = new Date().toISOString().split('T')[0];
            document.getElementById('voucherUntil').value = '';
            document.getElementById('voucherMaxUses').value = '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal(id = 'modal') {
            document.getElementById(id).classList.remove('active');
        }

        function saveVoucher() {
            const code = document.getElementById('voucherCode').value;
            const offer = document.getElementById('voucherOffer').value;
            const from = document.getElementById('voucherFrom').value;
            const until = document.getElementById('voucherUntil').value;
            const maxUses = parseInt(document.getElementById('voucherMaxUses').value) || 0;

            if (code && offer && from && until) {
                app.vouchers.push({
                    id: 'v_' + Date.now(),
                    code, offer,
                    validFrom: from,
                    validUntil: until,
                    maxUses,
                    redeemedCount: 0
                });
                app.save();
                app.render();
                closeModal();
            }
        }

        function saveSettings() {
            app.user.name = document.getElementById('businessName').value;
            app.save();
            alert('Saved!');
        }

        function searchVouchers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = app.vouchers.filter(v => v.code.toLowerCase().includes(query) || v.offer.toLowerCase().includes(query));

            const html = filtered.map(v => `
                <div class="voucher-card">
                    <div class="voucher-info">
                        <div class="voucher-code">${v.code}</div>
                        <div class="voucher-meta">${v.offer}</div>
                        <span class="voucher-status">Active</span>
                    </div>
                    <div class="voucher-actions">
                        <button class="action-btn" onclick="app.showQR('${v.id}')">📱</button>
                        <button class="action-btn" onclick="app.editVoucher('${v.id}')">✏️</button>
                        <button class="action-btn" onclick="app.deleteVoucher('${v.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('vouchersList').innerHTML = html || '<div class="empty-state">No results found</div>';
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrContainer canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.href = canvas.toDataURL();
                link.download = 'qrcode.png';
                link.click();
            }
        }

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
